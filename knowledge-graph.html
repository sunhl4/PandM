<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PandM · Knowledge Graph</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #06060e;
    font-family: 'Inter', 'SF Pro Display', system-ui, sans-serif;
  }

  canvas#bg { position: fixed; inset: 0; pointer-events: none; opacity: .55; }

  svg#graph {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
  }

  /* ── Tooltip ── */
  #tooltip {
    position: fixed;
    pointer-events: none;
    background: rgba(6,6,20,0.96);
    border: 1px solid rgba(0,212,255,0.18);
    border-radius: 10px;
    padding: 10px 14px;
    max-width: 280px;
    backdrop-filter: blur(16px);
    box-shadow: 0 0 28px rgba(0,212,255,0.12);
    transition: opacity .15s;
    opacity: 0;
    z-index: 100;
  }
  #tooltip .tt-label {
    font-size: 13px; font-weight: 700; color: #e2e8f0; margin-bottom: 4px;
  }
  #tooltip .tt-type {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: .08em; margin-bottom: 5px;
  }
  #tooltip .tt-desc { font-size: 11.5px; color: #94a3b8; line-height: 1.55; }
  #tooltip .tt-tags {
    margin-top: 7px; display: flex; flex-wrap: wrap; gap: 4px;
  }
  #tooltip .tt-tag {
    font-size: 9.5px; padding: 2px 6px; border-radius: 4px;
    background: rgba(255,255,255,0.06); color: #64748b;
    border: 1px solid rgba(255,255,255,0.06);
  }

  /* ── Legend ── */
  #legend {
    position: fixed; bottom: 24px; left: 24px;
    background: rgba(6,6,20,0.88);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 12px; padding: 14px 16px;
    backdrop-filter: blur(16px);
    box-shadow: 0 4px 24px rgba(0,0,0,.5);
  }
  #legend h3 {
    font-size: 10px; font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; color: #475569; margin-bottom: 10px;
  }
  .leg-row { display: flex; align-items: center; gap: 9px; margin-bottom: 7px; }
  .leg-row:last-child { margin-bottom: 0; }
  .leg-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    box-shadow: 0 0 7px currentColor;
  }
  .leg-label { font-size: 11px; color: #94a3b8; }
  .leg-sep { height: 1px; background: rgba(255,255,255,0.05); margin: 9px 0; }
  .leg-edge { display: flex; align-items: center; gap: 9px; margin-bottom: 5px; }
  .leg-line { width: 26px; height: 2px; border-radius: 1px; }

  /* ── Stats ── */
  #stats {
    position: fixed; top: 18px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 24px; align-items: center;
    background: rgba(6,6,20,0.88);
    border: 1px solid rgba(0,212,255,0.1);
    border-radius: 999px; padding: 8px 24px;
    backdrop-filter: blur(16px);
    box-shadow: 0 0 30px rgba(0,212,255,0.08);
  }
  #stats .logo {
    font-size: 13px; font-weight: 800; letter-spacing: .05em;
    background: linear-gradient(90deg, #00d4ff, #8b5cf6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  #stats .divider { width: 1px; height: 16px; background: rgba(255,255,255,0.07); }
  #stats .stat { font-size: 11px; color: #475569; }
  #stats .stat span { color: #94a3b8; font-weight: 600; }

  /* ── Hint ── */
  #hint {
    position: fixed; bottom: 24px; right: 24px;
    font-size: 10.5px; color: #334155;
    line-height: 1.7;
    text-align: right;
  }
</style>
</head>
<body>

<canvas id="bg"></canvas>

<svg id="graph">
  <defs>
    <!-- Radial backdrop glow for root -->
    <radialGradient id="rg-root" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#00d4ff" stop-opacity=".18"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rg-module" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#8b5cf6" stop-opacity=".12"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <!-- Edge gradients -->
    <marker id="arrow-hier" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 Z" fill="rgba(255,255,255,0.12)"/>
    </marker>
    <marker id="arrow-cross" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 Z" fill="rgba(139,92,246,0.4)"/>
    </marker>
    <!-- Glow filters per type -->
    <filter id="glow-root" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-mod" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-cat" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-leaf" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
</svg>

<div id="tooltip">
  <div class="tt-label" id="tt-label"></div>
  <div class="tt-type"  id="tt-type"></div>
  <div class="tt-desc"  id="tt-desc"></div>
  <div class="tt-tags"  id="tt-tags"></div>
</div>

<div id="legend">
  <h3>Node Types</h3>
  <div class="leg-row"><div class="leg-dot" style="background:#00d4ff;color:#00d4ff"></div><span class="leg-label">Root</span></div>
  <div class="leg-row"><div class="leg-dot" style="background:#8b5cf6;color:#8b5cf6"></div><span class="leg-label">Module</span></div>
  <div class="leg-row"><div class="leg-dot" style="background:#10b981;color:#10b981"></div><span class="leg-label">Category</span></div>
  <div class="leg-row"><div class="leg-dot" style="background:#f97316;color:#f97316"></div><span class="leg-label">Topic</span></div>
  <div class="leg-row"><div class="leg-dot" style="background:#f472b6;color:#f472b6"></div><span class="leg-label">Resource / Leaf</span></div>
  <div class="leg-sep"></div>
  <div class="leg-edge">
    <div class="leg-line" style="background:rgba(200,220,255,0.2)"></div>
    <span class="leg-label" style="font-size:10.5px;color:#475569">Hierarchy</span>
  </div>
  <div class="leg-edge">
    <div class="leg-line" style="background:repeating-linear-gradient(90deg,#8b5cf6 0,#8b5cf6 4px,transparent 4px,transparent 8px)"></div>
    <span class="leg-label" style="font-size:10.5px;color:#475569">Cross-module</span>
  </div>
</div>

<div id="stats">
  <span class="logo">PandM</span>
  <div class="divider"></div>
  <span class="stat">Nodes <span id="s-nodes">0</span></span>
  <div class="divider"></div>
  <span class="stat">Connections <span id="s-edges">0</span></span>
  <div class="divider"></div>
  <span class="stat" style="color:#00d4ff55">Knowledge Graph · 2026-04</span>
</div>

<div id="hint">
  Scroll to zoom · Drag to pan<br/>
  Hover node for details · Drag node to reposition
</div>

<script>
/* ══════════════════════════════════════════════════════
   1. GRAPH DATA  (curated nodes only)
   ══════════════════════════════════════════════════════ */
const nodes = [
  // root
  { id:'root',            label:'Knowledge Universe',      type:'root',     desc:'Three modules: Learning · Research Plans · Software Engineering', tags:['navigation','system'] },
  // modules
  { id:'learning',        label:'Learning Resources',      type:'module',   desc:'Systematic knowledge base across 6 directions', tags:['learning','knowledge base'] },
  { id:'work-plan',       label:'Research Plans',          type:'module',   desc:'Work roadmaps for two research directions', tags:['planning','roadmap'] },
  { id:'software',        label:'Software Engineering',    type:'module',   desc:'Three engineering directions with full Python packages', tags:['software engineering','toolchain'] },
  // learning categories
  { id:'learn-classical-chem', label:'Classical Comp. Chem.',  type:'category', desc:'DFT, HF, CCSD, molecular dynamics, PySCF toolchain', tags:['DFT','HF','CCSD','PySCF','MD'] },
  { id:'learn-qc',        label:'Quantum Computing',       type:'category', desc:'Qubits, gates, Qiskit basics, NISQ landscape', tags:['Qiskit','NISQ','qubit'] },
  { id:'learn-ml',        label:'Machine Learning',        type:'category', desc:'NNP, GNN, active learning, transfer learning', tags:['NNP','GNN','DeepMD'] },
  { id:'learn-qc-chem',   label:'QC × Comp. Chem.',        type:'category', desc:'VQE, SQD, ADAPT-VQE, QPE, DMET, TC, GBS — full method landscape', tags:['VQE','ADAPT-VQE','SQD','QPE','DMET'] },
  { id:'learn-qc-ml',     label:'QC × Machine Learning',   type:'category', desc:'QML, quantum kernels, VQC, PennyLane', tags:['QML','quantum kernel','VQC','PennyLane'] },
  { id:'learn-qc-md',     label:'QC × Mol. Dynamics',      type:'category', desc:'Quantum-accuracy PES generation, quantum-enhanced sampling', tags:['MD','QM/MM','NNP','PES'] },
  // learning leaves / topics
  { id:'phase1',          label:'Phase 1: Fundamentals',   type:'leaf',     desc:'QC fundamentals & concept mapping, Qiskit practice', tags:['Qiskit','Phase1','fundamentals'] },
  { id:'qc-vqe',          label:'VQE Theory & Impl.',      type:'leaf',     desc:'Variational Quantum Eigensolver — theory, ansatz, Qiskit', tags:['VQE','UCCSD','ansatz'] },
  { id:'qc-sqd',          label:'SQD / SKQD',              type:'leaf',     desc:'Sample-based Quantum Diagonalization + Krylov enhancement', tags:['SQD','SKQD','Krylov'] },
  { id:'qc-adaptvqe',     label:'ADAPT-VQE',               type:'leaf',     desc:'Adaptive ansatz construction via gradient-driven selection', tags:['ADAPT-VQE','gradient'] },
  { id:'qc-frontier',     label:'Frontier Methods (2026)', type:'topic',    desc:'TC, GBS, Gibbs, CQE, NEO, periodic, classical shadows …', tags:['TC','GBS','CQE','NEO','barren plateau'] },
  { id:'literature',      label:'Literature',              type:'topic',    desc:'5 key papers with Chinese translations and Q&A files', tags:['literature','translation','Q&A'] },
  { id:'lit-revmodphys',  label:'RevModPhys 92, 015003',   type:'leaf',     desc:'Quantum computational chemistry — comprehensive review', tags:['RevModPhys','review','VQE','QPE'] },
  { id:'lit-qcage',       label:'QC in the Age of QC',     type:'leaf',     desc:'Quantum chemistry in the age of quantum computing — Cao et al.', tags:['Chem. Reviews','VQE','QPE'] },
  { id:'lit-towards',     label:'Towards QC Advantage',    type:'leaf',     desc:'iQCC-based study: quantum advantage threshold for OLED emitters', tags:['iQCC','quantum advantage','OLED'] },
  { id:'lit-2508',        label:'arXiv 2508.02578',         type:'leaf',     desc:'Latest preprint — Chinese translation available', tags:['arXiv','preprint'] },
  { id:'lit-method-map',  label:'Method & Lit. Map 2026',  type:'leaf',     desc:'Comprehensive map of QC-for-chemistry methods through April 2026', tags:['review','method map','2026'] },
  // work-plan
  { id:'wp-qc-chem',      label:'QC×Comp.Chem. Plans',     type:'category', desc:'Few-qubit applications, quantum advantage, catalytic active sites', tags:['planning','few-qubit','quantum advantage'] },
  { id:'wp-qc-ml',        label:'QC×ML Plans',             type:'category', desc:'Quantum data + AI, QML force fields, bitstring features', tags:['quantum data','QML','SQD','AI'] },
  { id:'wp-fewqubit',     label:'Few-Qubit Applications',  type:'topic',    desc:'Algorithm validation, strongly-correlated systems, active-space', tags:['NISQ','few-qubit','H2','LiH'] },
  { id:'wp-advantage',    label:'Quantum Advantage',        type:'topic',    desc:'Multi-dimensional: precision × resource × classical baseline', tags:['quantum advantage','NISQ','QPE','FCI'] },
  { id:'wp-chemistry',    label:'Chem. Applications',      type:'topic',    desc:'Strongly-correlated active sites, catalysis, force field data', tags:['catalysis','DMET','Fe-N4'] },
  { id:'wp-qdata',        label:'Quantum Data',             type:'topic',    desc:'SQD bitstrings as quantum data assets for AI/ML collaboration', tags:['SQD','bitstring','AI'] },
  { id:'wp-qml',          label:'QML & Force Fields',       type:'topic',    desc:'Quantum kernel methods, quantum-accuracy PES augmentation', tags:['QML','NNP','PES','quantum kernel'] },
  // software
  { id:'sw-qc-chem',      label:'QC×Comp.Chem.',           type:'category', desc:'dft_qc_pipeline, quantum_chem_bench, reproductions', tags:['DFT','VQE','pipeline','benchmark'] },
  { id:'sw-qc-ml',        label:'QC×Machine Learning',     type:'category', desc:'QML toolchain, quantum data pipeline, kernel benchmarks', tags:['QML','PennyLane','quantum data'] },
  { id:'sw-qc-md',        label:'QC×Mol. Dynamics',        type:'category', desc:'Quantum-accuracy PES generation, NNP augmentation, QM/MM', tags:['MD','NNP','PES','QM/MM'] },
  { id:'sw-pipeline',     label:'DFT-QC Pipeline',         type:'topic',    desc:'DFT → DMET → active-space → VQE/SQD full workflow', tags:['DMET','DFT','VQE','SQD','PySCF'] },
  { id:'sw-bench',        label:'Benchmark Platform',      type:'topic',    desc:'quantum_chem_bench: HF/CCSD/VQE/SQD/QPE multi-method', tags:['benchmark','VQE','QPE','SQD','ZNE'] },
  { id:'sw-repro',        label:'Reproductions',           type:'topic',    desc:'SQD Nature Chem. 2024 and HF Sycamore Science 2020', tags:['SQD','Nature Chemistry','Sycamore'] },
  { id:'sw-qml-pipeline', label:'Quantum Data Eng.',       type:'leaf',     desc:'Bitstring processing, feature engineering, AI-assisted recovery', tags:['quantum data','bitstring','SQD','AI'] },
  { id:'sw-nnp-workflow', label:'NNP Training Tools',      type:'leaf',     desc:'Quantum-accuracy data points → NNP training set augmentation', tags:['NNP','PES','active learning','DeepMD'] },
]

const edges = [
  // root
  { s:'root', t:'learning' }, { s:'root', t:'work-plan' }, { s:'root', t:'software' },
  // learning branches
  { s:'learning', t:'learn-classical-chem' },
  { s:'learning', t:'learn-qc' },
  { s:'learning', t:'learn-ml' },
  { s:'learning', t:'learn-qc-chem' },
  { s:'learning', t:'learn-qc-ml' },
  { s:'learning', t:'learn-qc-md' },
  // learning leaves
  { s:'learn-qc',      t:'phase1' },
  { s:'learn-qc-chem', t:'qc-vqe' },
  { s:'learn-qc-chem', t:'qc-sqd' },
  { s:'learn-qc-chem', t:'qc-adaptvqe' },
  { s:'learn-qc-chem', t:'qc-frontier' },
  { s:'learn-qc-chem', t:'literature' },
  { s:'literature',    t:'lit-revmodphys' },
  { s:'literature',    t:'lit-qcage' },
  { s:'literature',    t:'lit-towards' },
  { s:'literature',    t:'lit-2508' },
  { s:'literature',    t:'lit-method-map' },
  // work-plan
  { s:'work-plan',  t:'wp-qc-chem' }, { s:'work-plan', t:'wp-qc-ml' },
  { s:'wp-qc-chem', t:'wp-fewqubit' }, { s:'wp-qc-chem', t:'wp-advantage' }, { s:'wp-qc-chem', t:'wp-chemistry' },
  { s:'wp-qc-ml',   t:'wp-qdata' },   { s:'wp-qc-ml',   t:'wp-qml' },
  // software
  { s:'software', t:'sw-qc-chem' }, { s:'software', t:'sw-qc-ml' }, { s:'software', t:'sw-qc-md' },
  { s:'sw-qc-chem', t:'sw-pipeline' }, { s:'sw-qc-chem', t:'sw-bench' }, { s:'sw-qc-chem', t:'sw-repro' },
  { s:'sw-qc-ml', t:'sw-qml-pipeline' },
  { s:'sw-qc-md', t:'sw-nnp-workflow' },
  // cross-module (dashed)
  { s:'wp-qc-chem',          t:'learn-qc-chem',   cross:true },
  { s:'wp-qc-ml',            t:'learn-qc-ml',      cross:true },
  { s:'sw-qc-chem',          t:'wp-qc-chem',       cross:true },
  { s:'sw-qc-ml',            t:'wp-qc-ml',         cross:true },
  { s:'sw-qc-md',            t:'learn-qc-md',      cross:true },
  { s:'wp-qdata',            t:'qc-sqd',           cross:true },
  { s:'wp-chemistry',        t:'sw-pipeline',      cross:true },
  { s:'sw-bench',            t:'sw-repro',         cross:true },
  { s:'learn-ml',            t:'learn-qc-ml',      cross:true },
  { s:'learn-classical-chem',t:'learn-qc-chem',    cross:true },
  { s:'sw-nnp-workflow',     t:'learn-ml',         cross:true },
  { s:'lit-towards',         t:'wp-advantage',     cross:true },
  { s:'lit-method-map',      t:'wp-advantage',     cross:true },
  { s:'qc-frontier',         t:'lit-method-map',   cross:true },
]

/* ══════════════════════════════════════════════════════
   2. CONFIG
   ══════════════════════════════════════════════════════ */
const TYPE = {
  root:     { color:'#00d4ff', r:34, filter:'url(#glow-root)', strokeW:2.5, glow:'rgba(0,212,255,.65)' },
  module:   { color:'#8b5cf6', r:26, filter:'url(#glow-mod)',  strokeW:2,   glow:'rgba(139,92,246,.5)' },
  category: { color:'#10b981', r:19, filter:'url(#glow-cat)',  strokeW:1.5, glow:'rgba(16,185,129,.4)' },
  topic:    { color:'#f97316', r:14, filter:'url(#glow-leaf)', strokeW:1.2, glow:'rgba(249,115,22,.35)' },
  leaf:     { color:'#f472b6', r:10, filter:'url(#glow-leaf)', strokeW:1,   glow:'rgba(244,114,182,.3)' },
}

/* ══════════════════════════════════════════════════════
   3. PARTICLE BACKGROUND
   ══════════════════════════════════════════════════════ */
const canvas = document.getElementById('bg')
const ctx = canvas.getContext('2d')
let W, H
const stars = []

function resizeBg() {
  W = canvas.width  = window.innerWidth
  H = canvas.height = window.innerHeight
}
resizeBg()
window.addEventListener('resize', resizeBg)

for (let i = 0; i < 220; i++) {
  stars.push({
    x: Math.random(), y: Math.random(),
    r: Math.random() * 1.2 + .2,
    a: Math.random(),
    speed: Math.random() * .0003 + .0001,
    phase: Math.random() * Math.PI * 2,
  })
}

function drawBg(t) {
  ctx.clearRect(0, 0, W, H)
  // deep radial vignette
  const g = ctx.createRadialGradient(W/2,H/2, 0, W/2,H/2, Math.max(W,H)*.6)
  g.addColorStop(0,   'rgba(0,30,50,0.35)')
  g.addColorStop(.5,  'rgba(0,0,0,0)')
  g.addColorStop(1,   'rgba(0,0,0,0.65)')
  ctx.fillStyle = g
  ctx.fillRect(0, 0, W, H)

  stars.forEach(s => {
    const flicker = .5 + .5 * Math.sin(t * s.speed * 1000 + s.phase)
    ctx.beginPath()
    ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI*2)
    ctx.fillStyle = `rgba(180,220,255,${s.a * flicker * .8})`
    ctx.fill()
  })
  requestAnimationFrame(drawBg)
}
requestAnimationFrame(drawBg)

/* ══════════════════════════════════════════════════════
   4. D3 GRAPH
   ══════════════════════════════════════════════════════ */
document.getElementById('s-nodes').textContent = nodes.length
document.getElementById('s-edges').textContent = edges.length

const svg   = d3.select('#graph')
const width  = window.innerWidth
const height = window.innerHeight

// Zoom layer
const g = svg.append('g').attr('class','zoomLayer')

svg.call(
  d3.zoom()
    .scaleExtent([.18, 3.5])
    .on('zoom', (e) => g.attr('transform', e.transform))
)

// Convert edges
const linkData = edges.map(e => ({
  source: e.s, target: e.t, cross: !!e.cross
}))

// Force simulation
const sim = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(linkData)
    .id(d => d.id)
    .distance(d => {
      const s = d.source, t = d.target
      if (d.cross) return 240
      if (s.type === 'root')     return 180
      if (s.type === 'module')   return 145
      if (s.type === 'category') return 110
      return 80
    })
    .strength(d => d.cross ? .04 : .55)
  )
  .force('charge', d3.forceManyBody()
    .strength(d => {
      const m = { root:-900, module:-520, category:-340, topic:-180, leaf:-120 }
      return m[d.type] || -160
    })
  )
  .force('center', d3.forceCenter(width/2, height/2).strength(.06))
  .force('collide', d3.forceCollide()
    .radius(d => TYPE[d.type].r * 2.4)
    .iterations(3)
  )
  .force('radial', d3.forceRadial(d => {
    const rmap = { root:0, module:200, category:420, topic:610, leaf:720 }
    return rmap[d.type] || 650
  }, width/2, height/2).strength(.08))
  .alphaDecay(.012)
  .velocityDecay(.38)

/* ── Orbital rings (decorative) around root ── */
const rings = [160, 250, 370]
rings.forEach(r => {
  g.append('circle')
    .attr('r', r)
    .attr('fill', 'none')
    .attr('stroke', 'rgba(0,212,255,0.035)')
    .attr('stroke-width', 1)
    .attr('stroke-dasharray', '4,8')
    .attr('cx', 0).attr('cy', 0)  // repositioned on tick
    .attr('class', `ring ring-${r}`)
})

/* ── Edges ── */
const edgeG = g.append('g').attr('class','edges')

const link = edgeG.selectAll('line')
  .data(linkData)
  .join('line')
  .attr('stroke', d => d.cross ? 'rgba(139,92,246,0.35)' : 'rgba(160,200,240,0.18)')
  .attr('stroke-width', d => d.cross ? 1.2 : 1.5)
  .attr('stroke-dasharray', d => d.cross ? '5,5' : null)
  .attr('marker-end', d => d.cross ? 'url(#arrow-cross)' : 'url(#arrow-hier)')

/* ── Node groups ── */
const nodeG = g.append('g').attr('class','nodes')

const node = nodeG.selectAll('g')
  .data(nodes)
  .join('g')
  .attr('class', d => `node node-${d.type}`)
  .call(
    d3.drag()
      .on('start', (e,d) => {
        if (!e.active) sim.alphaTarget(.2).restart()
        d.fx = d.x; d.fy = d.y
      })
      .on('drag', (e,d) => { d.fx = e.x; d.fy = e.y })
      .on('end', (e,d) => {
        if (!e.active) sim.alphaTarget(0)
        d.fx = null; d.fy = null
      })
  )

// Outer glow disc
node.append('circle')
  .attr('r', d => TYPE[d.type].r * 2.8)
  .attr('fill', d => {
    const c = TYPE[d.type].color
    return `radial-gradient(circle, ${c}22, transparent)`
  })
  .style('fill', d => {
    const hex = TYPE[d.type].color
    return `rgba(${hexToRgb(hex)}, 0.07)`
  })
  .attr('stroke', 'none')

// Pulse ring (only root & module)
node.filter(d => d.type === 'root' || d.type === 'module')
  .append('circle')
  .attr('class','pulse-ring')
  .attr('r', d => TYPE[d.type].r + 8)
  .attr('fill', 'none')
  .attr('stroke', d => TYPE[d.type].color)
  .attr('stroke-opacity', .0)
  .attr('stroke-width', 1.5)

// Main circle (with filter for glow)
node.append('circle')
  .attr('r', d => TYPE[d.type].r)
  .attr('fill', d => {
    const c = TYPE[d.type].color
    return `radial-gradient(circle at 35% 35%, ${c}ee, ${c}99)`
  })
  .style('fill', d => TYPE[d.type].color)
  .attr('fill-opacity', d => d.type === 'leaf' ? .82 : .9)
  .attr('stroke', d => TYPE[d.type].color)
  .attr('stroke-width', d => TYPE[d.type].strokeW)
  .attr('stroke-opacity', .6)
  .attr('filter', d => TYPE[d.type].filter)

// Inner highlight
node.filter(d => d.type !== 'leaf')
  .append('circle')
  .attr('r', d => TYPE[d.type].r * .52)
  .attr('cx', d => -TYPE[d.type].r * .28)
  .attr('cy', d => -TYPE[d.type].r * .28)
  .attr('fill', 'rgba(255,255,255,0.22)')
  .attr('stroke', 'none')

// Labels
node.append('text')
  .attr('dy', d => {
    const map = { root:52, module:40, category:32, topic:24, leaf:18 }
    return map[d.type] || 22
  })
  .attr('text-anchor','middle')
  .attr('fill', d => {
    const map = { root:'#e0f8ff', module:'#e2d9ff', category:'#d1fae5', topic:'#fed7aa', leaf:'#fce7f3' }
    return map[d.type] || '#e2e8f0'
  })
  .attr('font-size', d => {
    const map = { root:13, module:11.5, category:10.5, topic:10, leaf:9 }
    return map[d.type] || 9.5
  })
  .attr('font-weight', d => d.type === 'root' || d.type === 'module' ? '700' : '500')
  .attr('letter-spacing', d => d.type === 'root' ? '.04em' : '0')
  .attr('opacity', d => d.type === 'leaf' ? .75 : 1)
  .each(function(d) {
    // Wrap long labels
    const words = d.label.split(/\s+/)
    const el = d3.select(this)
    if (words.length <= 2 || d.type === 'root') {
      el.text(d.label)
    } else {
      const line1 = words.slice(0, Math.ceil(words.length/2)).join(' ')
      const line2 = words.slice(Math.ceil(words.length/2)).join(' ')
      const dy0 = parseFloat(el.attr('dy')) - 7
      el.attr('dy', dy0)
      el.append('tspan').attr('x',0).attr('dy', 0).text(line1)
      el.append('tspan').attr('x',0).attr('dy', '1.3em').text(line2)
    }
  })

/* ── Tooltip ── */
const tip = document.getElementById('tooltip')

node
  .on('mouseenter', (e, d) => {
    document.getElementById('tt-label').textContent = d.label
    const tc = { root:'#00d4ff', module:'#8b5cf6', category:'#10b981', topic:'#f97316', leaf:'#f472b6' }
    document.getElementById('tt-type').style.color = tc[d.type]
    document.getElementById('tt-type').textContent = d.type.toUpperCase()
    document.getElementById('tt-desc').textContent = d.desc
    const tagsEl = document.getElementById('tt-tags')
    tagsEl.innerHTML = ''
    if (d.tags) d.tags.slice(0,6).forEach(t => {
      const s = document.createElement('span'); s.className='tt-tag'; s.textContent = t
      tagsEl.appendChild(s)
    })
    tip.style.opacity = '1'
    // highlight connected nodes
    const connected = new Set([d.id])
    linkData.forEach(l => {
      const s = typeof l.source === 'object' ? l.source.id : l.source
      const t = typeof l.target === 'object' ? l.target.id : l.target
      if (s === d.id) connected.add(t)
      if (t === d.id) connected.add(s)
    })
    node.attr('opacity', n => connected.has(n.id) ? 1 : .18)
    link.attr('stroke-opacity', l => {
      const s = typeof l.source === 'object' ? l.source.id : l.source
      const t = typeof l.target === 'object' ? l.target.id : l.target
      return (s === d.id || t === d.id) ? (l.cross ? .65 : .9) : .04
    })
  })
  .on('mousemove', e => {
    const x = e.clientX, y = e.clientY
    const tw = tip.offsetWidth, th = tip.offsetHeight
    tip.style.left = (x + 18 + tw > window.innerWidth  ? x - tw - 14 : x + 14) + 'px'
    tip.style.top  = (y + 14 + th > window.innerHeight ? y - th - 14 : y + 10) + 'px'
  })
  .on('mouseleave', () => {
    tip.style.opacity = '0'
    node.attr('opacity', 1)
    link.attr('stroke-opacity', d => d.cross ? .35 : .18)
  })

/* ── Simulation tick ── */
sim.on('tick', () => {
  link
    .attr('x1', d => d.source.x)
    .attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x)
    .attr('y2', d => d.target.y)

  node.attr('transform', d => `translate(${d.x},${d.y})`)

  // reposition orbital rings to root
  const rootNode = nodes.find(n => n.id === 'root')
  if (rootNode && rootNode.x) {
    d3.selectAll('.ring').attr('cx', rootNode.x).attr('cy', rootNode.y)
  }
})

/* ── Animated pulse on root & module nodes ── */
function animatePulse(t) {
  d3.selectAll('.pulse-ring').each(function(d) {
    const speed = d.type === 'root' ? .0013 : .0009
    const phase = d.id === 'root' ? 0 : (d.id === 'learning' ? 1.2 : d.id === 'work-plan' ? 2.4 : 3.6)
    const alpha = .5 + .5 * Math.sin(t * speed * 1000 + phase)
    d3.select(this)
      .attr('stroke-opacity', alpha * .35)
      .attr('r', d => TYPE[d.type].r + 8 + alpha * 14)
  })
  requestAnimationFrame(animatePulse)
}
requestAnimationFrame(animatePulse)

/* ── Helper ── */
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16)
  const g = parseInt(hex.slice(3,5),16)
  const b = parseInt(hex.slice(5,7),16)
  return `${r},${g},${b}`
}

/* ── Initial zoom to fit ── */
window.addEventListener('resize', () => {
  sim.force('center', d3.forceCenter(window.innerWidth/2, window.innerHeight/2).strength(.06))
})
</script>
</body>
</html>
