# LiH, STO-3G, RHF — minimal 2e/2o active space (bonding pair) for fast integration tests.
# Bond ~1.595 Å. Full valence CAS would need more occupied/virtual orbitals in the model.
backend:
  type: pyscf
  geometry: "Li 0 0 0; H 0 0 1.595"
  basis: sto-3g
  method: hf
  charge: 0
  spin: 0

regions:
  - name: LiH_valence
    atom_indices: [0, 1]
    nelec: 2
    norb: 2
    localization: none

embedding:
  type: simple_cas
  max_iter: 1
  conv_tol: 1.0e-6

mapper:
  type: parity
  z2symmetry_reduction: true

solver:
  type: numpy
  compute_rdm: true
